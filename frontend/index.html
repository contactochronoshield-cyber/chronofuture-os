<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ChronoFuture Institute</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #000000, #050505);
    color: #00ffcc;
    font-family: Arial;
    text-align: center;
    overflow-x: hidden;
}

h1 {
    margin-top: 50px;
    font-size: 3em;
    text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ffcc; }
    to { text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc; }
}

.container {
    margin-top: 40px;
}

button {
    margin-top: 20px;
    background: transparent;
    color: #00ffcc;
    border: 2px solid #00ffcc;
    padding: 15px 30px;
    font-size: 1.2em;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ffcc;
    color: black;
}

.card {
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #00ffcc;
    width: 300px;
    box-shadow: 0 0 20px #00ffcc;
}

#output {
    margin-top: 20px;
    font-size: 1.1em;
}

.footer {
    margin-top: 50px;
    font-size: 0.9em;
}
</style>
</head>

<body>

<h1>⚡ ChronoFuture Institute ⚡</h1>

<div class="container">

<div class="card">
    <h3>Domina el tiempo</h3>
    <p>Aprende tecnología, IA y el futuro con ChronoFuture.</p>
</div>

<button onclick="getSystem()">Conectar al Sistema</button>

<p id="output"></p>

<div class="footer">
    <p>📩 chronofutureinstitute@outlook.com</p>
    <p>El futuro comienza ahora</p>
</div>

</div>

<script>
async function getSystem() {
    try {
        const res = await fetch("https://chronofuture-os.onrender.com/system");
        const data = await res.json();

        document.getElementById("output").innerText =
            "⚡ " + data.name + " | Estado: " + data.status + " | Versión: " + data.version;

    } catch (error) {
        document.getElementById("output").innerText = "Error conectando...";
    }
}
</script>

</body>
</html>
